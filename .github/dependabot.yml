version: 2
updates:
  # Go module dependencies (currently stdlib-only; this keeps it covered as deps are added).
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)

  # GitHub Actions used by CI.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(ci)
